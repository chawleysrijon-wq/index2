<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aesthetic Gallery Grid</title>
    <!-- Modern Premium Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="grid.css">
</head>
<body>
    <div class="page-wrapper">
        <header class="gallery-header">
            <h1>Curated Visual Stories</h1>
            <p>A high-fidelity layout recreation utilizing dynamic CSS Grid</p>
        </header>

        <main class="gallery-grid">
            <!-- Column 1, Rows 1-2: Foggy Sea Stack -->
            <div class="grid-item item-sea-stack">
                <img src="images/foggy_sea_stack.png" alt="Foggy sea stack beach cliff" loading="lazy">
            </div>

            <!-- Column 2, Row 1: Pumpkin Soup Dining Table -->
            <div class="grid-item item-dining">
                <img src="images/dining_table_pumpkin_soup.png" alt="Yellow pumpkin soup dining table" loading="lazy">
            </div>

            <!-- Column 3, Rows 1-2: Mediterranean Building -->
            <div class="grid-item item-mediterranean">
                <img src="images/mediterranean_building_street.png" alt="Mediterranean building and street view" loading="lazy">
            </div>

            <!-- Column 2, Rows 2-3: Yellow Wall Wooden Door -->
            <div class="grid-item item-yellow-door">
                <img src="images/yellow_wall_wooden_door.png" alt="Yellow wall and brown wooden door with shadows" loading="lazy">
            </div>

            <!-- Column 1, Row 3: Minimalist Room -->
            <div class="grid-item item-minimalist">
                <img src="images/minimalist_white_room.png" alt="Minimalist white room interior" loading="lazy">
            </div>

            <!-- Column 3, Row 3: Grassy Sand Dune Beach -->
            <div class="grid-item item-sand-dune">
                <img src="images/grassy_sand_dune_beach.png" alt="Grassy sand dunes overlooking the beach" loading="lazy">
            </div>
        </main>

        <footer class="gallery-footer">
            <p>&copy; 2026 Curated Gallery. All rights reserved.</p>
        </footer>
    </div>
</body>
</html>
