<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Portal Control Center</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Ambient glowing nodes in the background -->
    <div class="ambient-glows">
        <div class="glow-orb glow-orb-1"></div>
        <div class="glow-orb glow-orb-2"></div>
    </div>
    
    <div class="form-container">
        <!-- Dashboard Header -->
        <div class="form-header">
            <h1>AI Portal Control Center</h1>
            <p>Initialize system parameters, configure variables, and run directory configurations.</p>
        </div>
        
        <!-- Registration/Config Form -->
        <form action="/action.php" method="post" id="ai-onboarding-form">
            
            <!-- Section 1: Security & Identity -->
            <div class="form-section-title">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                Identity & Access Credentials
            </div>
            
            <div class="form-grid">
                <div class="form-group">
                    <label for="username">
                        Username:
                    </label>
                    <div class="input-with-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                        <input type="text" id="username" name="username" placeholder="neural_operator">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>
                        Secure Password:
                    </label>
                    <div class="input-with-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                        <input type="password" name="password" placeholder="Enter Password">
                    </div>
                </div>

                <div class="form-group">
                    <label>
                        Terminal Email:
                    </label>
                    <div class="input-with-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                        <input type="email" name="email" placeholder="operator@antigravity.ai">
                    </div>
                </div>

                <div class="form-group">
                    <label>
                        Source Domain / Website:
                    </label>
                    <div class="input-with-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
                        <input type="url" name="website" placeholder="https://antigravity.ai">
                    </div>
                </div>
            </div>

            <!-- Section 2: Personal Profile Data -->
            <div class="form-section-title">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                Biometric & Origin Profile
            </div>

            <div class="form-grid">
                <div class="form-group">
                    <label>
                        Operator Age:
                    </label>
                    <input type="number" name="age" min="18" max="100" placeholder="18">
                </div>

                <div class="form-group">
                    <label>
                        Date of Birth:
                    </label>
                    <input type="date" name="dob">
                </div>

                <div class="form-group">
                    <label>
                        Gender Identity:
                    </label>
                    <div class="radio-group-container">
                        <label class="custom-radio">
                            <input type="radio" name="gender" value="male">
                            <span class="checkmark"></span>
                            Male
                        </label>
                        <label class="custom-radio">
                            <input type="radio" name="gender" value="female">
                            <span class="checkmark"></span>
                            Female
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label>
                        Country Node:
                    </label>
                    <select name="country">
                        <option value="us">USA</option>
                        <option value="ca">Canada</option>
                    </select>
                </div>
            </div>

            <!-- Section 3: Core Settings & File Uploads -->
            <div class="form-section-title">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.54 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                Core Settings & Attachments
            </div>

            <div class="form-grid">
                <div class="form-group">
                    <label>
                        Volume Level:
                    </label>
                    <div class="range-container">
                        <input type="range" name="volume" min="0" max="100" value="50">
                        <span class="range-val" id="volume-val">50%</span>
                    </div>
                </div>

                <div class="form-group">
                    <label>
                        Resume File:
                    </label>
                    <div class="file-upload-wrapper">
                        <div class="file-upload-btn" id="file-btn-text">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                            Choose file to upload...
                        </div>
                        <input type="file" name="resume" id="resume-input">
                    </div>
                </div>

                <div class="form-group full-width">
                    <label>
                        Search Database / Knowledge Query:
                    </label>
                    <input type="search" name="query" placeholder="Search neural knowledge bases...">
                </div>

                <div class="form-group full-width">
                    <label>
                        Additional System Comments:
                    </label>
                    <textarea name="comments" rows="4" placeholder="Input any system specifications or logs..."></textarea>
                </div>
            </div>

            <!-- Footer Details & Submit -->
            <div class="footer-actions">
                <label class="custom-checkbox">
                    <input type="checkbox" name="subscribe" value="yes">
                    <span class="checkmark"></span>
                    Subscribe to quantum intelligence updates
                </label>
                
                <button type="submit">
                    Initialize Setup
                </button>
            </div>

        </form>
    </div>

    <!-- Scripting for range slider and file picker visual responsiveness -->
    <script>
        // Synchronize Volume Slider display
        const volumeSlider = document.querySelector('input[type="range"]');
        const volumeDisplay = document.getElementById('volume-val');
        if (volumeSlider && volumeDisplay) {
            volumeSlider.addEventListener('input', (e) => {
                volumeDisplay.textContent = e.target.value + '%';
            });
        }

        // Synchronize File Upload text display
        const fileInput = document.getElementById('resume-input');
        const fileBtnText = document.getElementById('file-btn-text');
        if (fileInput && fileBtnText) {
            fileInput.addEventListener('change', (e) => {
                if (e.target.files.length > 0) {
                    fileBtnText.textContent = 'Selected: ' + e.target.files[0].name;
                    fileBtnText.style.borderColor = 'var(--accent-cyan)';
                    fileBtnText.style.color = 'var(--accent-cyan)';
                    fileBtnText.style.boxShadow = '0 0 15px rgba(6, 182, 212, 0.15)';
                } else {
                    fileBtnText.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg> Choose file to upload...';
                    fileBtnText.style.borderColor = 'var(--input-border)';
                    fileBtnText.style.color = 'var(--text-muted)';
                    fileBtnText.style.boxShadow = 'none';
                }
            });
        }
    </script>
</body>
</html>
