<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiple CSS Classes</title>

    <style>
        .red-text {
            color: red;
        }

        .large-text {
            font-size: 30px;
        }

        .bold-text {
            font-weight: bold;
        }

        .center-text {
            text-align: center;
        }

        .rounded-box {
            border: 2px solid black;
            border-radius: 10px;
            padding: 15px;
        }
    </style>
</head>
<body>

    <div class="red-text large-text bold-text center-text rounded-box">
        This element uses multiple CSS classes!
    </div>

</body>
</html>
